name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Server: lint + test ────────────────────────────────────────────────────
  server-lint-test:
    name: Server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test


  # ── UI: build (Svelte/Vite) ────────────────────────────────────────────────
  ui-build:
    name: UI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (server target)
        run: npm run build
        env:
          BUILD_TARGET: server

      # Upload the compiled UI so the Docker build job can use it without rebuilding.
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: server/static/
          retention-days: 1


  # ── Docker: build image ────────────────────────────────────────────────────
  docker-build:
    name: Docker (build)
    runs-on: ubuntu-latest
    needs: [server-lint-test, ui-build]
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Only push on tags — just build on PRs and main branch pushes.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build (and push on tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── Security: Grype vulnerability scan on Docker image ───────────────────
  security-scan:
    name: Security scan (Grype)
    runs-on: ubuntu-latest
    needs: [server-lint-test, ui-build]
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image locally so Grype can scan it — no push needed
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: hashash:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Grype
        uses: anchore/scan-action@v4
        id: grype
        continue-on-error: true       # never block the pipeline
        with:
          image: "hashash:scan"
          fail-build: false           # report findings; don't fail CI
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}


  # ── Release: create GitHub Release ────────────────────────────────────────
  # Desktop builds are not yet implemented (M3/M4). Tauri jobs will be
  # re-added when the desktop milestone begins.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "#ash ${{ github.ref_name }}"
          body: |
            ## #ash ${{ github.ref_name }}

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            See the [README](https://github.com/${{ github.repository }}) for setup instructions.
          draft: true
