name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Server: lint + test ────────────────────────────────────────────────────
  server-lint-test:
    name: Server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test


  # ── UI: build (Svelte/Vite) ────────────────────────────────────────────────
  ui-build:
    name: UI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (server target)
        run: npm run build
        env:
          BUILD_TARGET: server

      # Upload the compiled UI so the Docker build job can use it without rebuilding.
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: server/static/
          retention-days: 1


  # ── Docker: build image ────────────────────────────────────────────────────
  docker-build:
    name: Docker (build)
    runs-on: ubuntu-latest
    needs: [server-lint-test, ui-build]
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Only push on tags — just build on PRs and main branch pushes.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build (and push on tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── Security: Grype vulnerability scan on Docker image ───────────────────
  security-scan:
    name: Security scan (Grype)
    runs-on: ubuntu-latest
    needs: [server-lint-test, ui-build]
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image locally so Grype can scan it — no push needed
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: hashash:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Grype
        uses: anchore/scan-action@v4
        id: grype
        with:
          image: "hashash:scan"
          fail-build: true
          severity-cutoff: high       # fail on HIGH or CRITICAL
          output-format: sarif
          output-file: grype.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()                  # upload even if Grype found issues
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype.sarif


  # ── Desktop: build Tauri app (matrix: Linux / macOS / Windows) ────────────
  desktop-build:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [server-lint-test, ui-build]

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            bundle-path: desktop/src-tauri/target/release/bundle
            artifact-pattern: |
              desktop/src-tauri/target/release/bundle/deb/*.deb
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage

          - platform: macos
            runner: macos-latest
            bundle-path: desktop/src-tauri/target/release/bundle
            artifact-pattern: |
              desktop/src-tauri/target/release/bundle/macos/*.app
              desktop/src-tauri/target/release/bundle/dmg/*.dmg

          - platform: windows
            runner: windows-latest
            bundle-path: desktop/src-tauri/target/release/bundle
            artifact-pattern: |
              desktop/src-tauri/target/release/bundle/msi/*.msi
              desktop/src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Linux: install Tauri's system dependencies (GTK, WebKit, etc.)
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Build Tauri app
        run: npm run build
        working-directory: desktop
        env:
          # Disable debug info in CI to speed up linking
          RUSTFLAGS: "-C debuginfo=0"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: hash-desktop-${{ matrix.platform }}
          path: ${{ matrix.artifact-pattern }}
          if-no-files-found: warn
          retention-days: 7


  # ── Release: create GitHub Release with all artifacts ─────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [docker-build, desktop-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hash-desktop-*
          merge-multiple: false
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "#ash ${{ github.ref_name }}"
          body: |
            ## #ash ${{ github.ref_name }}

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Desktop clients
            Download the installer for your platform from the assets below.

            See [docs/architecture.md](docs/architecture.md) for setup instructions.
          files: release-artifacts/**/*
          draft: true
          fail_on_unmatched_files: false
