name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Server: lint + test ────────────────────────────────────────────────────
  server-lint-test:
    name: Server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test


  # ── UI: build (Svelte/Vite) ────────────────────────────────────────────────
  ui-build:
    name: UI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (server target)
        run: npm run build
        env:
          BUILD_TARGET: server

      # Upload the compiled UI so the Docker build job can use it without rebuilding.
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: server/static/
          retention-days: 1


  # ── Docker: build image ────────────────────────────────────────────────────
  docker-build:
    name: Docker (build)
    runs-on: ubuntu-latest
    needs: [server-lint-test, ui-build]
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Only push on tags — just build on PRs and main branch pushes.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build (and push on tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── Security: Grype vulnerability scan on Docker image ───────────────────
  security-scan:
    name: Security scan (Grype)
    runs-on: ubuntu-latest
    needs: [server-lint-test, ui-build]
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image locally so Grype can scan it — no push needed
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: hashash:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Grype
        uses: anchore/scan-action@v4
        id: grype
        continue-on-error: true       # never block the pipeline
        env:
          GRYPE_DB_VALIDATE_AGE: "false"   # allow CI runners to use cached DB
        with:
          image: "hashash:scan"
          fail-build: false           # report findings; don't fail CI
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Security tab
        if: always() && steps.grype.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}


  # ── E2E: Playwright tests ──────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [server-lint-test, ui-build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright deps
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      # Download the pre-built UI from the ui-build job
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: server/static/

      - name: Build server binary
        run: cargo build --release -p hash-server

      - name: Start server and run E2E tests
        env:
          E2E_API_KEY: e2e-test-key
          E2E_BASE_URL: http://localhost:3535
          HASH_API_KEY: e2e-test-key
          HASH_VAULT_PATH: /tmp/e2e-vault
        run: |
          mkdir -p /tmp/e2e-vault
          (cd server && exec env HASH_VAULT_PATH=/tmp/e2e-vault HASH_API_KEY=e2e-test-key \
            ../target/release/hash-server) &
          SERVER_PID=$!
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:3535 > /dev/null 2>&1 && break || sleep 1
          done
          cd e2e && npx playwright test
          kill $SERVER_PID || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7


  # ── Release: create GitHub Release ────────────────────────────────────────
  # Runs only on version tags after the Docker image is pushed and the
  # security scan completes. Desktop binaries are uploaded afterwards by
  # the desktop-build job which depends on this one.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Pull the section that starts with "## [vX.Y.Z]" for this tag.
          # Stop at the next "## [" heading so we don't bleed into older entries.
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          printf 'notes<<%s\n%s\n%s\n' "EOF" "$NOTES" "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "#ash ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            See the [README](https://github.com/${{ github.repository }}) for setup instructions.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}


  # ── Desktop: build Tauri app for macOS / Windows / Linux ──────────────────
  # Runs only on version tags, after the GitHub Release exists so that
  # tauri-action can upload the binaries as release assets.
  desktop-build:
    name: Desktop (${{ matrix.platform }})
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            extra-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            extra-targets: ""
          - platform: ubuntu-22.04
            args: ""
            extra-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.extra-targets }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Install UI node_modules so beforeBuildCommand (cd ../ui && npm run build) works
      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and upload desktop binaries
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          args: ${{ matrix.args }}
